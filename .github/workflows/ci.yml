name: Full CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  playwright:
    name: Ui_Final
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: UI_Final

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: UI_Final/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        env:
          BASE_URL: ${{ secrets.UI_BASE_URL }}
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: UI_Final/playwright-report/

  api-tests:
    name: API_Final
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: API_Final

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22
          cache: maven

      - name: Run Maven Tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: mvn -B test

      - name: Upload Maven Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: API_Final/target/surefire-reports/