name: Playwright CI

on:
  push:
    branches:
      - capstone/299167-hemanth
  pull_request:
    branches:
      - capstone/299167-hemanth

jobs:
  playwright:
    name: Ui_Final
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: UI_Final

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: UI_Final/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        env:
          BASE_URL: ${{ secrets.HEMANTH_BASE_URL }}
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: UI_Final/playwright-report/